<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Directory</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: #2f2f4a;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .card h2 {
            margin: 10px 0 5px;
        }

        .card p {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<header>
    <h1>Meet the Team</h1>
    <p>Click a profile to learn more</p>
</header>

<div class="container">
    <a class="card" href="latrell.html">
        <h2>Latrell</h2>
        <p>View profile</p>
    </a>

    <a class="card" href="anton.html">
        <h2>Anton</h2>
        <p>View profile</p>
    </a>

    <a class="card" href="hawkins.html">
        <h2>Hawkins</h2>
        <p>View profile</p>
    </a>

    <a class="card" href="jaredo.html">
        <h2>Jaredo</h2>
        <p>View profile</p>
    </a>

    <a class="card" href="jared.html">
        <h2>Jared</h2>
        <p>View profile</p>
    </a>

    <a class="card" href="km.html">
        <h2>KM</h2>
        <p>View profile</p>
    </a>
</div>

</body>
</html>
